name: OnePlus 15 Build 1B - GKI base kernel

# Official OnePlus .201/.202 common source built using community-derived
# direct-GKI procedure. Pure Image, no Bazel/oplus wrapper, no appended DTB.
# Stock .300 kernel_dtb preserved during magiskboot repack.
# Toolchain: clang r536225 + Rust 1.82.0 + build-tools (cctv18 release).

on:
  workflow_dispatch:

env:
  SOURCE_REPO: OnePlusOSS/android_kernel_common_oneplus_sm8850
  SOURCE_SHA: d9053b907db4bb5da938e9cf947d0ae32302ceaf
  SOURCE_BRANCH: oneplus/sm8850_b_16.0.0_oneplus_15
  TOOLCHAIN_BASE: https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang19-r536225

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    steps:
      - name: Disk cleanup
        run: |
          set -euo pipefail
          df -h /
          mkdir -p /tmp/.background_trash/{1..10}
          safe_mv() { [ -e "$1" ] && sudo mv "$1" "$2" || true; }
          export -f safe_mv
          safe_mv /usr/share/dotnet /tmp/.background_trash/1 &
          safe_mv /usr/local/lib/android /tmp/.background_trash/2 &
          safe_mv /opt/ghc /tmp/.background_trash/3 &
          safe_mv /opt/hostedtoolcache/CodeQL /tmp/.background_trash/4 &
          safe_mv /usr/local/share/chromium /tmp/.background_trash/5 &
          safe_mv /usr/local/share/powershell /tmp/.background_trash/6 &
          safe_mv /opt/hostedtoolcache/go /tmp/.background_trash/7 &
          safe_mv /opt/hostedtoolcache/PyPy /tmp/.background_trash/8 &
          safe_mv /opt/hostedtoolcache/node /tmp/.background_trash/9 &
          sudo bash -c 'mv /usr/local/julia* /tmp/.background_trash/10 2>/dev/null || true' &
          wait
          sudo nice -n 19 ionice -c 3 rm -rf /tmp/.background_trash &
          disown
          df -h /

      - name: Install dependencies
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ca-certificates cpio curl flex git \
            kmod libelf-dev libssl-dev lz4 python3 python-is-python3 \
            zip zstd rsync ccache aria2 pigz pahole libdw-dev elfutils dwarves

      - name: Download source and toolchains
        run: |
          set -euo pipefail
          mkdir -p kernel_workspace
          cd kernel_workspace
          WORKDIR="$(pwd)"
          echo "WORKDIR=$WORKDIR" >> "$GITHUB_ENV"

          echo "=== Source: $SOURCE_REPO @ $SOURCE_SHA ==="

          # Parallel downloads
          aria2c -x16 -s16 -k1M --retry-wait=5 --max-tries=10 \
            --summary-interval=0 --header='User-Agent: Mozilla/5.0' \
            -o source.tar.gz "https://github.com/${SOURCE_REPO}/archive/${SOURCE_SHA}.tar.gz" &
          PID_SRC=$!

          aria2c -x16 -s16 -k1M --retry-wait=5 --max-tries=5 \
            --summary-interval=0 -o clang.zip "${TOOLCHAIN_BASE}/clang-r536225.zip" &
          PID_CLG=$!

          aria2c -x16 -s16 -k1M --retry-wait=5 --max-tries=5 \
            --summary-interval=0 -o rust.zip "${TOOLCHAIN_BASE}/rust.zip" &
          PID_RST=$!

          aria2c -x16 -s16 -k1M --retry-wait=5 --max-tries=5 \
            --summary-interval=0 -o build-tools.zip "${TOOLCHAIN_BASE}/build-tools.zip" &
          PID_BT=$!

          wait $PID_SRC || { echo "FATAL: source download failed"; exit 1; }
          wait $PID_CLG || { echo "FATAL: clang download failed"; exit 1; }
          wait $PID_RST || { echo "FATAL: rust download failed"; exit 1; }
          wait $PID_BT  || { echo "FATAL: build-tools download failed"; exit 1; }
          echo "All downloads complete"

          # Sequential extraction
          echo "Extracting source..."
          mkdir -p common
          tar -I "pigz -p $(nproc)" -x -f source.tar.gz -C common --strip-components=1
          rm source.tar.gz

          echo "Extracting clang..."
          mkdir -p clang19
          unzip -q clang.zip -d clang19
          rm clang.zip

          echo "Extracting rust..."
          mkdir -p rust
          unzip -q rust.zip -d rust
          rm rust.zip

          echo "Extracting build-tools..."
          unzip -q build-tools.zip
          rm build-tools.zip

          # Verify critical files
          test -f common/arch/arm64/configs/gki_defconfig || { echo "FATAL: gki_defconfig missing"; exit 1; }
          test -f common/Makefile || { echo "FATAL: kernel Makefile missing"; exit 1; }

          # Absolute toolchain paths
          export PATH="$WORKDIR/clang19/bin:$WORKDIR/build-tools/bin:$WORKDIR/rust/bin:$PATH"
          echo "PATH=$WORKDIR/clang19/bin:$WORKDIR/build-tools/bin:$WORKDIR/rust/bin:$PATH" >> "$GITHUB_ENV"
          echo "LIBCLANG_PATH=$WORKDIR/clang19/lib" >> "$GITHUB_ENV"

          # Verify all required tools
          echo "=== Toolchain verification ==="
          command -v clang   && clang --version | head -1   || { echo "FATAL: clang missing"; exit 1; }
          command -v ld.lld                                 || { echo "FATAL: ld.lld missing"; exit 1; }
          command -v rustc   && rustc --version             || { echo "FATAL: rustc missing"; exit 1; }
          command -v bindgen && bindgen --version           || { echo "FATAL: bindgen missing"; exit 1; }
          command -v pahole  && pahole --version            || echo "WARN: pahole from system"
          test -d "$WORKDIR/clang19/lib"                    || { echo "FATAL: LIBCLANG_PATH missing"; exit 1; }

          df -h /

      - name: Build kernel
        run: |
          set -euo pipefail
          cd "$WORKDIR/common"

          # Reproducible build environment (from Kleaf _setup_env.sh)
          export TZ=UTC
          export LC_ALL=C
          export SOURCE_DATE_EPOCH=1717397200
          export KBUILD_BUILD_TIMESTAMP="$(date -u -d @$SOURCE_DATE_EPOCH '+%a %b %e %T UTC %Y')"
          export KBUILD_BUILD_USER=build-user
          export KBUILD_BUILD_HOST=build-host
          export KBUILD_BUILD_VERSION=1
          export KBUILD_GENDWARFKSYMS_STABLE=1
          export LIBCLANG_PATH="$WORKDIR/clang19/lib"

          echo "=== Build environment ==="
          echo "KBUILD_GENDWARFKSYMS_STABLE=$KBUILD_GENDWARFKSYMS_STABLE"
          echo "SOURCE_DATE_EPOCH=$SOURCE_DATE_EPOCH"
          echo "KBUILD_BUILD_TIMESTAMP=$KBUILD_BUILD_TIMESTAMP"

          # Prefix mapping - map PARENT workspace, not common/ (gendwarfksyms needs this)
          ROOT_REAL_PATH="$WORKDIR"
          MAP_FLAGS="-fdebug-prefix-map=$ROOT_REAL_PATH=. -fmacro-prefix-map=$ROOT_REAL_PATH=. -ffile-prefix-map=$ROOT_REAL_PATH=."

          KCFLAGS="$MAP_FLAGS -no-canonical-prefixes -Wno-error -D__ANDROID_COMMON_KERNEL__"
          KCPPFLAGS="$MAP_FLAGS -D__ANDROID_COMMON_KERNEL__"

          MAKE_ARGS=(
            LLVM=1
            LLVM_IAS=1
            ARCH=arm64
            CROSS_COMPILE=aarch64-linux-gnu-
            CC="clang"
            LD="ld.lld"
            AR="llvm-ar"
            NM="llvm-nm"
            OBJCOPY="llvm-objcopy"
            OBJDUMP="llvm-objdump"
            STRIP="llvm-strip"
            HOSTCC="clang"
            HOSTCXX="clang++"
            HOSTLD="ld.lld"
            KCFLAGS="$KCFLAGS"
            KCPPFLAGS="$KCPPFLAGS"
          )

          command -v rustc &>/dev/null && MAKE_ARGS+=(RUSTC="$(command -v rustc)")
          command -v bindgen &>/dev/null && MAKE_ARGS+=(BINDGEN="$(command -v bindgen)")
          command -v pahole &>/dev/null && MAKE_ARGS+=(PAHOLE="$(command -v pahole)")

          echo "=== Build start: $(date -u) ==="

          # Config
          make -j"$(nproc)" O=out "${MAKE_ARGS[@]}" gki_defconfig

          # Verify Rust toolchain
          make O=out "${MAKE_ARGS[@]}" rustavailable || { echo "FATAL: Rust toolchain check failed"; exit 1; }

          make -j"$(nproc)" O=out "${MAKE_ARGS[@]}" olddefconfig

          # Enforce required config symbols
          REQUIRED=(
            "CONFIG_MODULES=y"
            "CONFIG_MODVERSIONS=y"
            "CONFIG_GENDWARFKSYMS=y"
            "CONFIG_RUST=y"
            "CONFIG_DEBUG_INFO_BTF=y"
          )
          for symbol in "${REQUIRED[@]}"; do
            grep -qx "$symbol" out/.config || { echo "FATAL: missing $symbol"; exit 1; }
          done

          # Reject root framework
          if grep -qE '^CONFIG_KSU=|^CONFIG_KPM=|^CONFIG_KSU_SUSFS=' out/.config; then
            echo "FATAL: root framework config found"
            grep -E '^CONFIG_KSU|^CONFIG_KPM|^CONFIG_KSU_SUSFS' out/.config
            exit 1
          fi
          echo "Config validated"

          # Kernelrelease
          KERNELRELEASE=$(make -s O=out "${MAKE_ARGS[@]}" kernelrelease)
          echo "=== Kernel release: $KERNELRELEASE ==="
          echo "=== Stock .300:     6.12.23-android16-5-gb2a876903b49-ab14541642-4k ==="
          echo "KERNELRELEASE=$KERNELRELEASE" >> "$GITHUB_ENV"

          # Build
          make -j"$(nproc)" O=out "${MAKE_ARGS[@]}" Image 2>&1 | tee build.log
          test "${PIPESTATUS[0]}" -eq 0 || { echo "FATAL: build failed"; grep -i "error:" build.log | tail -30; exit 1; }

          # Verify outputs
          test -s out/arch/arm64/boot/Image || { echo "FATAL: Image not produced"; exit 1; }
          test -s out/vmlinux.symvers || { echo "FATAL: vmlinux.symvers missing"; exit 1; }

          echo "=== Build end: $(date -u) ==="
          echo "Image: $(stat -c%s out/arch/arm64/boot/Image) bytes"
          sha256sum out/arch/arm64/boot/Image
          df -h /

      - name: Collect artifacts
        run: |
          set -euo pipefail
          cd "$WORKDIR/common"
          mkdir -p "$WORKDIR/artifacts"

          cp out/arch/arm64/boot/Image "$WORKDIR/artifacts/"
          cp out/.config "$WORKDIR/artifacts/kernel_built_config"
          cp out/vmlinux.symvers "$WORKDIR/artifacts/"
          cp out/System.map "$WORKDIR/artifacts/" 2>/dev/null || true
          cp out/modules.builtin "$WORKDIR/artifacts/" 2>/dev/null || true
          cp out/modules.builtin.modinfo "$WORKDIR/artifacts/" 2>/dev/null || true
          tail -500 build.log > "$WORKDIR/artifacts/build_tail.log"

          cat > "$WORKDIR/artifacts/BUILD_INFO.txt" << INFOEOF
          Source: ${{ env.SOURCE_REPO }}
          Branch: ${{ env.SOURCE_BRANCH }}
          Commit: ${{ env.SOURCE_SHA }}
          Kernelrelease: ${{ env.KERNELRELEASE }}
          Stock .300: 6.12.23-android16-5-gb2a876903b49-ab14541642-4k
          Clang: $(clang --version | head -1)
          Rustc: $(rustc --version 2>/dev/null)
          KBUILD_GENDWARFKSYMS_STABLE: 1
          Image size: $(stat -c%s "$WORKDIR/artifacts/Image") bytes
          Build date: $(date -u)
          Method: make gki_defconfig + make Image (direct GKI)
          INFOEOF

          cd "$WORKDIR/artifacts"
          sha256sum * | tee SHA256SUMS.txt
          ls -la

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: op15-build1b-gki-kernel
          path: ${{ github.workspace }}/kernel_workspace/artifacts/*
          retention-days: 30
          if-no-files-found: error

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: op15-build1b-full-log
          path: ${{ github.workspace }}/kernel_workspace/common/build.log
          retention-days: 14
          if-no-files-found: warn
